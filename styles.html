    <style>
      :root {
        --bg-soft: #f3f6fb;
        --surface: #ffffff;
        --surface-muted: #f8fafc;
        --line-soft: #dbe3ee;
        --text-main: #1f2937;
        --text-sub: #556275;
        --primary: #1b66d1;
        --primary-hover: #1657b2;
        --success: #1f8f4f;
        --success-hover: #167340;
        --warning: #d38a00;
        --warning-hover: #b77400;
        --seen-bg: #d7e6ff;
        --seen-text: #1e3a67;
        --shadow-soft: 0 8px 24px rgba(15, 23, 42, 0.08);
      }

      html, body {
  height: 100%;
}

      body {
        font-family: 'Google Sans', Roboto, Arial, sans-serif;

        background-repeat: no-repeat;
        background-size: cover;
        margin: 0;
        padding: 0;
        color: var(--text-main);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .app-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255, 255, 255, 0.86);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 12px 24px;
        border-bottom: 1px solid var(--line-soft);
        position: sticky;
        top: 0;
        z-index: 100;
        min-height: 60px;

      }
      .app-toolbar.is-viewing-other-user {

        border-bottom-color: #ecd3b8;

      .logo-container { flex: 1; display: flex; align-items: center; }
      .logo-container img { height: 40px; } 
      
      .toolbar-controls { flex: 2; display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
      .toolbar-user {
        position: relative;
        margin-left: 12px;
      }
      .toolbar-user-button {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 5px 10px 5px 8px;
        border: 1px solid #d7e2f0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.93);

        color: inherit;

      }
      .toolbar-user-button:hover {

      }

      .toolbar-profile-image {

        height: 34px;
        border-radius: 50%;
        border: 1px solid #d3deec;
        background: #eef3fb;
        flex-shrink: 0;
        object-fit: cover;
        display: block;
        box-shadow: 0 1px 3px rgba(15, 23, 42, 0.1);
      }
      .toolbar-profile-image.is-fallback {
        border-color: #e8c5ad;
        background: #fff7f2;
      }
      .welcome-text {
        font-size: 13px;
        font-weight: 600;
        color: #233144;
        white-space: nowrap;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .viewing-mode-label {
        color: #7a4a1f;
      }
      .viewing-mode-separator {
        color: #b28a65;
      }
      .viewing-mode-link {

        font-weight: 700;
      }
      .toolbar-chevron {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 16px;
        height: 16px;
        color: #607289;
        flex-shrink: 0;
      }
      .toolbar-chevron svg {
        width: 16px;
        height: 16px;
        display: block;
      }
      .user-menu-dropdown {
        position: absolute;
        top: calc(100% + 10px);
        right: 0;
        min-width: 240px;
        padding: 8px;
        border: 1px solid #dbe4f0;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 16px 32px rgba(15, 23, 42, 0.14);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        z-index: 240;
      }
      .user-menu-group {
        position: relative;
      }
      .user-menu-item {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 10px;
        padding: 10px 12px;
        border: none;
        border-radius: 10px;
        background: transparent;
        color: #233144;
        text-align: left;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

        background: #f4f8fd;
      }

        color: #8a96a8;
        cursor: default;
      }
      .user-menu-item.is-placeholder:hover {
        background: transparent;
      }
      .user-menu-icon,
      .user-menu-chevron {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 15px;
        height: 15px;
        flex-shrink: 0;
      }
      .user-menu-icon svg,
      .user-menu-chevron svg {
        width: 15px;
        height: 15px;
        display: block;
        fill: currentColor;
        color: #607289;
      }
      .user-menu-chevron svg {
        fill: none;
      }
      .user-menu-chevron {
        margin-left: auto;
      }
      .user-submenu {
        margin-top: 6px;
        padding: 6px;
        border: 1px solid #e3eaf3;
        border-radius: 12px;
        background: #fbfdff;
      }
      .user-submenu-item {
        width: 100%;
        padding: 9px 10px;
        border: none;
        border-radius: 9px;
        background: transparent;
        color: #314154;
        text-align: left;
        font: inherit;
        font-size: 12.5px;
        cursor: pointer;
      }
      .user-submenu-item:hover {
        background: #eef5ff;
      }
      .user-submenu-item.is-active {
        background: #e9f1fd;
        color: #1f4f94;
        font-weight: 700;
      }
      .admin-badge {
        display: inline-flex;
        position: relative;
        width: 18px;
        height: 22px;
        margin-left: -3px;
        margin-right: 1px;
        font-size: 0;
        line-height: 0;
        background: linear-gradient(180deg, #f2d68b 0%, #cf9d4a 100%);
        border: 1px solid #9a7233;
        clip-path: polygon(50% 100%, 8% 78%, 8% 18%, 50% 2%, 92% 18%, 92% 78%);
        box-shadow: inset 0 1px 0 rgba(255, 247, 221, 0.7), 0 1px 2px rgba(31, 41, 55, 0.2);
        flex-shrink: 0;
      }
      .admin-badge::before {
        content: "A";
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -52%);
        font-size: 11px;
        font-weight: 800;
        line-height: 1;
        color: #2f2414;
        letter-spacing: 0.1px;
      }
      .super-admin-badge::before {
        content: "SA";
        font-size: 8px;
        letter-spacing: 0;
      }
      .super-admin-badge::after {
        content: "";
        position: absolute;
        left: 50%;
        top: -6px;
        width: 12px;
        height: 6px;
        transform: translateX(-50%);
        background: linear-gradient(180deg, #f5df98 0%, #cf9d4a 100%);
        border: 1px solid #9a7233;
        clip-path: polygon(0% 100%, 12% 38%, 28% 68%, 50% 0%, 72% 68%, 88% 38%, 100% 100%);
        box-shadow: inset 0 1px 0 rgba(255, 247, 221, 0.7);
      }
      .is-hidden { display: none !important; }
      select {
        padding: 9px 12px;
        font-size: 13px;
        border: 1px solid var(--line-soft);
        border-radius: 10px;
        background-color: #fff;
        color: var(--text-main);
        cursor: pointer;
        transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      }
      select:hover { background-color: var(--surface-muted); }
      select:focus {
        outline: none;
        border-color: #b7caf0;
        box-shadow: 0 0 0 3px rgba(27, 102, 209, 0.12);
      }
      
      .container {
  flex: 1 0 auto;
  padding: 24px 20px;
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  box-sizing: border-box;
}
      .floating-feedback-button {
        position: fixed;
        right: 22px;
        bottom: 22px;
        z-index: 110;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        background: #e39a5b;
        color: #ffffff;
        border-radius: 50%;
        width: 60px;
        height: 60px;
        padding: 0;
        cursor: pointer;
        box-shadow: 0 16px 34px rgba(147, 90, 42, 0.28), 0 8px 18px rgba(15, 23, 42, 0.16);
        transition: transform 0.15s ease, box-shadow 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
      }
      .floating-feedback-button-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        flex-shrink: 0;
        line-height: 0;
      }
      .floating-feedback-button-icon svg {
        width: 36px;
        height: 36px;
        display: block;
        fill: currentColor;
      }
      .floating-feedback-button:hover {
        background: #d98947;
        transform: translateY(-1px);
        box-shadow: 0 18px 36px rgba(147, 90, 42, 0.32), 0 10px 22px rgba(15, 23, 42, 0.18);
      }
      .feedback-toast {
        position: fixed;
        top: 84px;
        right: 20px;
        z-index: 1200;
        max-width: 320px;
        padding: 12px 14px;
        border-radius: 12px;
        background: #1f8f4f;
        color: #ffffff;
        font-size: 13px;
        font-weight: 700;
        box-shadow: 0 14px 28px rgba(31, 143, 79, 0.24);
        opacity: 0;
        pointer-events: none;
        transform: translateY(-6px);
        transition: opacity 0.2s ease, transform 0.2s ease;
      }
      .feedback-toast.active {
        opacity: 1;
        transform: translateY(0);
      }
      .app-footer {
  max-width: 1200px;
  width: 100%;
  margin: 0 auto;
  margin-top: auto;
  padding: 6px 20px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  font-size: 10.5px;
  color: #7a8698;
  border-top: 1px solid #e7edf6;
  box-sizing: border-box;
}
      .footer-meta {
        white-space: nowrap;
      }
      .footer-copy {
        text-align: right;
      }
      
      .task-card {
        background-color: var(--surface) !important;
        border: 1px solid #e2e9f3 !important;
        border-left: 5px solid #e3a45f !important;
        border-radius: 14px !important;
        padding: 20px 22px !important;
        margin-bottom: 18px !important;
        box-shadow: var(--shadow-soft) !important;
        position: relative;
        overflow: hidden;
        padding-right: 200px !important;
        transition: box-shadow 0.2s ease, transform 0.2s ease;
      }
      .task-card:hover {
        box-shadow: 0 10px 26px rgba(15, 23, 42, 0.12) !important;
        transform: translateY(-1px);
      }
      
      /* --- NEW: SOLID BLACK TITLES & METADATA --- */
      .card-title { 
          font-size: 21px; 
          font-weight: 700; 
          color: var(--text-main) !important; 
          margin-bottom: 10px; 
          line-height: 1.28;
      }

      .card-meta { 
          font-size: 12px; 
          color: var(--text-sub) !important; 
          margin-bottom: 10px; 
          padding-bottom: 12px; 
          border-bottom: 1px solid #f1f3f4; 
          display: flex; 
          align-items: center; 
          flex-wrap: wrap; 
          gap: 6px;
          font-weight: 400; 
      }

      /* --- NEW: SIREN & COUNTDOWN TAGS --- */
      .priority-urgent {
          background-color: #b42318; 
          color: #ffffff;            
          padding: 3px 10px;
          border-radius: 999px;
          font-weight: 700;
          display: inline-flex;
          align-items: center;
          gap: 4px;
          font-size: 12px;
          letter-spacing: 0.15px;
          box-shadow: 0 2px 8px rgba(180, 35, 24, 0.25);
      }

      .archive-tag {
    font-style: italic;
    color: #6f3ea8;
    background-color: #f3ebff;
    border: 1px solid #dcc4fb;
    font-weight: bold;
    font-size: 12px;
    padding: 2px 6px;
    border-radius: 4px;
    text-align: right;
}
      
      .inline-section { font-size: 14px; margin-bottom: 8px; line-height: 1.55; color: var(--text-main);}
      .inline-section b { color: var(--text-main); margin-right: 4px; font-weight: 600;}
      
      .inline-section a { color: #1a73e8; text-decoration: underline; }
      .inline-section a:hover { color: #1557b0; }

      .half-break { height: 8px; }

      .text-wrapper.clamped { display: flex; align-items: baseline; gap: 4px; }
      .text-wrapper.clamped .inline-label { white-space: nowrap; }
      .text-wrapper.clamped .clamp-target { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; word-break: break-word; }
      .text-wrapper.expanded { display: block; }
      .text-wrapper.expanded .clamp-target { display: inline; word-break: break-word; }
      .text-wrapper.expanded .toggle-link { display: inline-block; margin-left: 4px; }
      .toggle-link { color: #1a73e8; text-decoration: underline; cursor: pointer; font-size: 13px; white-space: nowrap; }
      .toggle-link:hover { color: #1557b0; }
      
      .tag-deadline { background-color: #fff5d8; color: #a86300; padding: 4px 8px; border-radius: 999px; font-weight: 700; font-size: 12px; border: 1px solid #f3ddb0; text-align: right;}
      .tag-overdue { background-color: #fee2e2; color: #9f1d1d; padding: 4px 9px; border-radius: 999px; font-weight: 700; font-size: 12px; border: 1px solid #efb4b4; text-align: right; box-shadow: 0 1px 6px rgba(159, 29, 29, 0.18);}
      
      .bottom-tag-stack { position: absolute; bottom: 20px; right: 24px; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; z-index: 1; }
      
      .card-buttons { margin-top: 18px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;}
      
      .btn-action, .btn-pending, .btn-seen, .btn-calendar {
        height: 36px; min-height: 36px; max-height: 36px; box-sizing: border-box; display: inline-flex; align-items: center; justify-content: center;
        border: none; padding: 0 16px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none;
        transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease; font-family: inherit; margin: 0; line-height: 1;
      }
      .btn-action { background-color: var(--success); color: #fff; box-shadow: 0 4px 10px rgba(31, 143, 79, 0.25); }
      .btn-action:hover { background-color: var(--success-hover); transform: translateY(-1px); }
      .btn-pending { background-color: var(--warning); color: #fff; box-shadow: 0 2px 8px rgba(211, 138, 0, 0.2); }
      .btn-pending:hover { background-color: var(--warning-hover); transform: translateY(-1px); }
      .btn-seen { background-color: var(--seen-bg); color: var(--seen-text); border: 1px solid #c3d7fa; } 
      .btn-seen:hover { background-color: #c7dbff; transform: translateY(-1px); }
      .btn-calendar { background-color: var(--primary); color: #fff; box-shadow: 0 4px 10px rgba(27, 102, 209, 0.25); }
      .btn-calendar:hover { background-color: var(--primary-hover); transform: translateY(-1px); }

      .task-card.card-urgent {
        border-left-color: #cf6e1d !important;
        box-shadow: 0 10px 24px rgba(194, 111, 31, 0.14) !important;
      }
      .task-card.card-overdue {
        border-left-color: #c24134 !important;
        border-color: #f0c5bf !important;
        box-shadow: 0 12px 24px rgba(178, 52, 40, 0.16) !important;
        background: linear-gradient(180deg, #fffefe 0%, #fff7f6 100%) !important;
      }

      .skeleton-list { display: grid; gap: 18px; }
      .skeleton-card {
        border-left: 5px solid #e6edf6 !important;
        background: #ffffff !important;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06) !important;
      }
      .skeleton-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 14px; }
      .skeleton-icon { width: 46px; height: 46px; border-radius: 10px; background: #e7edf6; flex-shrink: 0; }
      .skeleton-head-text { flex: 1; }
      .skeleton-line { border-radius: 10px; background: #e8eef7; }
      .skeleton-title { height: 16px; width: 68%; margin-bottom: 10px; }
      .skeleton-meta { height: 12px; width: 44%; }
      .skeleton-body { height: 12px; width: 92%; margin: 8px 0; }
      .skeleton-body.short { width: 72%; }
      .skeleton-buttons { margin-top: 14px; display: flex; gap: 10px; }
      .skeleton-btn { height: 34px; width: 128px; border-radius: 10px; background: #e7edf6; }
      .shimmer {
        position: relative;
        overflow: hidden;
      }
      .shimmer::after {
        content: "";
        position: absolute;
        inset: 0;
        transform: translateX(-100%);
        background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.68) 50%, transparent 100%);
        animation: skeleton-shimmer 1.35s ease-in-out infinite;
      }
      @keyframes skeleton-shimmer {
        100% { transform: translateX(100%); }
      }

      #taskContainer {
        opacity: 1;
        transition: opacity 0.16s ease;
        will-change: opacity;
      }
      #taskContainer.list-fade-out {
        opacity: 0;
      }
      #taskContainer.list-fade-in {
        animation: task-container-fade-in 0.2s ease;
      }
      @keyframes task-container-fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        #taskContainer {
          transition: none;
        }
        #taskContainer.list-fade-in {
          animation: none;
        }
      }
      
      .loading { text-align: center; padding: 60px; color: #66758a; font-size: 14px; }
